<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360">
  <rect x="1" y="1" width="978" height="358" fill="#ffffff" stroke="#d0d0d0" stroke-width="2"/>

  <g transform="translate(40,40)" font-family="Arial, Helvetica, sans-serif">
    <text x="0" y="0" font-size="24" fill="#2c2a28">
      Single-Radius Thick Round-Rect Normalization
    </text>
    <text x="0" y="28" font-size="14" fill="#5b564f">
      The outer boundary expands by delta; the inner boundary stays rounded, becomes rectangular, or disappears.
    </text>

    <g transform="translate(0,58)">
      <rect x="0" y="0" width="260" height="220" rx="14" fill="#faf8f6" stroke="#d8d2ca" stroke-width="1.5"/>
      <text x="20" y="26" font-size="19" fill="#2c2a28">Round inner</text>
      <text x="20" y="48" font-size="13" fill="#5b564f">delta &lt; r keeps a rounded inner boundary</text>

      <rect x="56" y="66" width="168" height="96" rx="36" fill="#f6d7a7" stroke="#26221d" stroke-width="3"/>
      <rect x="80" y="90" width="120" height="48" rx="12" fill="#ffffff" stroke="#2f6796" stroke-width="3"/>
      <rect x="68" y="78" width="144" height="72" rx="24" fill="none" stroke="#8d8277" stroke-width="2" stroke-dasharray="6 4"/>

      <text x="130" y="192" font-size="13" text-anchor="middle" fill="#5b564f">centerline</text>
      <text x="140" y="118" font-size="13" text-anchor="middle" fill="#2f6796">inner</text>
    </g>

    <g transform="translate(300,58)">
      <rect x="0" y="0" width="260" height="220" rx="14" fill="#faf8f6" stroke="#d8d2ca" stroke-width="1.5"/>
      <text x="20" y="26" font-size="19" fill="#2c2a28">Rect inner</text>
      <text x="20" y="48" font-size="13" fill="#5b564f">delta &gt; r clamps the inner radius to 0</text>

      <rect x="40" y="50" width="200" height="128" rx="52" fill="#f6d7a7" stroke="#26221d" stroke-width="3"/>
      <rect x="96" y="106" width="88" height="16" fill="#ffffff" stroke="#2f6796" stroke-width="3"/>
      <rect x="68" y="78" width="144" height="72" rx="24" fill="none" stroke="#8d8277" stroke-width="2" stroke-dasharray="6 4"/>

      <text x="140" y="118" font-size="13" text-anchor="middle" fill="#2f6796">inner rect</text>
      <text x="130" y="192" font-size="13" text-anchor="middle" fill="#5b564f">same centerline, larger delta</text>
    </g>

    <g transform="translate(600,58)">
      <rect x="0" y="0" width="260" height="220" rx="14" fill="#faf8f6" stroke="#d8d2ca" stroke-width="1.5"/>
      <text x="20" y="26" font-size="19" fill="#2c2a28">Filled fold</text>
      <text x="20" y="48" font-size="13" fill="#5b564f">collapsed inner bounds remove interior pixels</text>

      <rect x="28" y="38" width="224" height="152" rx="64" fill="#f6d7a7" stroke="#26221d" stroke-width="3"/>
      <rect x="68" y="78" width="144" height="72" rx="24" fill="none" stroke="#8d8277" stroke-width="2" stroke-dasharray="6 4"/>

      <text x="140" y="112" font-size="15" text-anchor="middle" fill="#9c3f37">no inner region remains</text>
      <text x="140" y="134" font-size="13" text-anchor="middle" fill="#9c3f37">shape becomes a filled outer round rect</text>
    </g>

    <g transform="translate(880,86)" font-size="14" fill="#2c2a28">
      <rect x="0" y="0" width="18" height="18" fill="#f6d7a7" stroke="#26221d" stroke-width="1.5"/>
      <text x="28" y="14">outline-color region</text>
      <rect x="0" y="34" width="18" height="18" fill="#ffffff" stroke="#2f6796" stroke-width="1.5"/>
      <text x="28" y="48">inner boundary</text>
      <line x1="0" y1="78" x2="18" y2="78" stroke="#8d8277" stroke-width="2" stroke-dasharray="6 4"/>
      <text x="28" y="82">centerline round rect</text>
    </g>
  </g>
</svg>